# Для продакшена на сервере: только образ из GHCR (без build-контекста).
# Скопируйте этот файл на сервер в DEPLOY_PATH вместе с .env.
# Переменная APP_IMAGE задаётся в CI при деплое или вручную, например:
#   export APP_IMAGE=ghcr.io/kaluginvit72/svo_viplaty:latest

services:
  bot:
    image: ${APP_IMAGE}
    container_name: svo-viplaty-bot
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/leads.db
    volumes:
      - bot-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bot-data:
