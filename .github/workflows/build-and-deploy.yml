# Сборка образа → GitHub Container Registry (ghcr.io) → деплой по SSH на сервер.
#
# Секреты репозитория (Settings → Secrets and variables → Actions):
#   SSH_HOST              — хост сервера (IP или домен)
#   SSH_USER              — пользователь SSH
#   SSH_PRIVATE_KEY       — приватный ключ (весь PEM, включая BEGIN/END)
#   DEPLOY_PATH           — каталог на сервере: .env, docker-compose.deploy.yml (из репозитория), доступ docker
#   GHCR_USERNAME         — логин GitHub для docker login на сервере (часто совпадает с владельцем образа)
#   GHCR_READ_TOKEN       — PAT с правом read:packages (для приватного образа обязателен; для публичного тоже удобен)
#
# На сервере в DEPLOY_PATH должен лежать docker-compose (или свой манифест), где image совпадает с ghcr.io/... ниже.

name: Build, push to GHCR, deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.vars.outputs.image }}
      tag_sha: ${{ steps.vars.outputs.tag_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR — только нижний регистр)
        id: vars
        run: |
          OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          REPO_LOWER=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/${OWNER_LOWER}/${REPO_LOWER}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${IMAGE}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:latest
            ${{ steps.vars.outputs.tag_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via SSH
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Проверка секретов (SSH + деплой)
        run: |
          missing=""
          [ -z "${{ secrets.SSH_HOST }}" ] && missing="${missing} SSH_HOST"
          [ -z "${{ secrets.SSH_USER }}" ] && missing="${missing} SSH_USER"
          [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ] && missing="${missing} SSH_PRIVATE_KEY"
          [ -z "${{ secrets.DEPLOY_PATH }}" ] && missing="${missing} DEPLOY_PATH"
          if [ -n "$missing" ]; then
            echo "::error::Задайте секреты в Settings → Secrets → Actions:$missing"
            echo "::notice::DEPLOY_PATH — абсолютный путь на сервере, где лежат .env и docker-compose.deploy.yml (например /opt/svo-viplaty)"
            exit 1
          fi

      - name: Run remote deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          GHCR_USER: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE,GHCR_USER,GHCR_TOKEN,DEPLOY_PATH
          script: |
            set -euo pipefail
            test -n "${DEPLOY_PATH:-}" || { echo "DEPLOY_PATH empty"; exit 1; }
            # убрать пробелы/переносы из секрета GitHub
            DEPLOY_PATH="$(printf '%s' "$DEPLOY_PATH" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "Каталог DEPLOY_PATH не существует на сервере: $DEPLOY_PATH"
              echo "Создайте каталог на сервере под этим путём и положите docker-compose.deploy.yml и .env"
              exit 1
            fi
            cd "$DEPLOY_PATH"
            test -f docker-compose.deploy.yml || { echo "Нет файла docker-compose.deploy.yml в $DEPLOY_PATH"; exit 1; }
            test -f .env || { echo "Нет файла .env в $DEPLOY_PATH"; exit 1; }
            export APP_IMAGE="${IMAGE}:latest"
            if [ -n "${GHCR_TOKEN:-}" ] && [ -n "${GHCR_USER:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            docker compose -f docker-compose.deploy.yml pull
            docker compose -f docker-compose.deploy.yml up -d --remove-orphans
            docker image prune -f
